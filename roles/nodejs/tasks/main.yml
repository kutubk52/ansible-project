---
# tasks file for roles/nodejs
- name: Install Node.js
  dnf:
    name: nodejs
    state: present

- name: Create app directory
  file:
    path: /opt/app
    state: directory

- name: Copy app files
  copy:
    src: ../../app/
    dest: /opt/app/

- name: Install dependencies
  command: npm install
  args:
    chdir: /opt/app

- name: Start app
  shell: "DB_HOST={{ hostvars[groups['db'][0]].ansible_host }} nohup node server.js > app.log 2>&1 &"
  args:
    chdir: /opt/app
